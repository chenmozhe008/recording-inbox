name: quality

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile Python
        run: python -c "import glob, py_compile; [py_compile.compile(path, doraise=True) for path in [*glob.glob('scripts/*.py'), 'run_launcher.py']]"
      - name: Run unit and simulated end-to-end tests
        run: python -m unittest discover -s tests -v
